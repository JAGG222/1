<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>둘레와 넓이 놀이터</title>
<style>
  :root{
    --bg:#F0F4F8; --surface:#FFFFFF; --ink:#22314A; --muted:#6B7A90;
    --peri:#FF6B54;         /* 둘레 = 주황 (빙 두른 길) */
    --peri-soft:#FFE3DC;
    --area:#0FB5A6;         /* 넓이 = 청록 (안쪽 칸) */
    --area-soft:#D5F4F0;
    --grid:#D5DEEA;
    --sun:#FFC53D;
    --line:#E4EAF2;
    --radius:20px;
    --shadow:0 6px 22px rgba(34,49,74,.08);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 64px;}

  header.app-head{text-align:center;padding:8px 0 4px;}
  .brand{font-size:clamp(24px,5.5vw,34px);font-weight:800;letter-spacing:-.5px;}
  .brand .p{color:var(--peri);} .brand .a{color:var(--area);}
  .sub{margin:6px 0 0;color:var(--muted);font-size:15px;font-weight:500;}

  /* 탭 */
  nav.tabs{display:flex;gap:8px;overflow-x:auto;padding:16px 2px 10px;scrollbar-width:none;}
  nav.tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;
    border:2px solid transparent;background:var(--surface);color:var(--muted);
    border-radius:16px;padding:10px 14px;min-width:74px;font-weight:700;font-size:14px;
    cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,border-color .12s,color .12s;}
  .tab .ic{font-size:20px;line-height:1;}
  .tab:hover{transform:translateY(-2px);}
  .tab.on{border-color:var(--ink);color:var(--ink);}
  .tab:focus-visible{outline:3px solid var(--sun);outline-offset:2px;}

  section.view{display:none;}
  section.view.on{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px 18px 20px;margin-bottom:16px;}
  .card h2{margin:0 0 2px;font-size:20px;font-weight:800;}
  .card p.lead{margin:0 0 12px;color:var(--muted);font-size:15px;font-weight:500;}

  /* 모드 토글 */
  .modes{display:flex;gap:10px;margin-bottom:14px;}
  .mode-btn{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;
    padding:12px 8px;font-weight:800;font-size:16px;cursor:pointer;color:var(--muted);
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;}
  .mode-btn .dot{width:14px;height:14px;border-radius:50%;}
  .mode-btn:focus-visible{outline:3px solid var(--sun);outline-offset:2px;}
  .mode-btn.on.peri{border-color:var(--peri);color:var(--peri);background:var(--peri-soft);}
  .mode-btn.on.area{border-color:var(--area);color:var(--area);background:var(--area-soft);}
  .mode-btn .dot.p{background:var(--peri);} .mode-btn .dot.a{background:var(--area);}

  .stage{background:#FBFCFE;border:1px solid var(--line);border-radius:16px;padding:10px;}
  svg{display:block;width:100%;height:auto;touch-action:manipulation;}
  .gridline{stroke:var(--grid);stroke-width:1;}
  .shape-fill{transition:fill .2s;}
  .side{stroke:#C3CEDD;stroke-width:6;stroke-linecap:round;transition:stroke .2s;}
  .side.done{stroke:var(--peri);}
  .hit{stroke:transparent;stroke-width:26;stroke-linecap:round;cursor:pointer;}
  .hit:focus-visible{outline:none;}
  .hit:focus-visible + .side{stroke:var(--sun);}
  .vertex{fill:var(--ink);}
  .lenlabel{font-weight:800;font-size:17px;fill:var(--peri);opacity:0;transition:opacity .25s;}
  .lenlabel.show{opacity:1;}
  .cell{fill:var(--area);stroke:#fff;stroke-width:1.5;opacity:0;transition:opacity .18s;}
  .cell.show{opacity:.92;}
  .cellnum{font-size:13px;font-weight:700;fill:#fff;opacity:0;transition:opacity .18s;}
  .cellnum.show{opacity:1;}

  /* 조절 스테퍼 */
  .steppers{display:flex;gap:14px;flex-wrap:wrap;margin:14px 0 4px;}
  .stp{display:flex;align-items:center;gap:8px;background:#F4F7FB;border-radius:14px;padding:8px 10px;}
  .stp .lab{font-weight:800;font-size:15px;min-width:38px;}
  .stp button{width:38px;height:38px;border-radius:12px;border:none;background:#fff;
    font-size:22px;font-weight:800;color:var(--ink);cursor:pointer;box-shadow:var(--shadow);line-height:1;}
  .stp button:active{transform:scale(.94);}
  .stp button:disabled{opacity:.3;cursor:default;}
  .stp button:focus-visible{outline:3px solid var(--sun);outline-offset:2px;}
  .stp .val{font-size:20px;font-weight:800;min-width:26px;text-align:center;}

  .typesel{display:flex;gap:10px;align-items:center;margin:0 0 14px;}
  .typesel .tlab{font-weight:800;color:var(--muted);font-size:14px;}
  .typesel .tbtn{flex:1;border:2px solid var(--line);background:#fff;border-radius:14px;
    padding:11px 8px;font-weight:800;font-size:15px;color:var(--muted);cursor:pointer;transition:.12s;}
  .typesel .tbtn.on{border-color:var(--ink);color:var(--ink);background:#F4F7FB;}
  .typesel .tbtn:focus-visible{outline:3px solid var(--sun);outline-offset:2px;}

  /* 결과판 */
  .readout{margin-top:14px;border-radius:16px;padding:14px 16px;font-weight:700;
    background:#F4F7FB;font-size:17px;min-height:56px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;line-height:1.5;}
  .readout.peri{background:var(--peri-soft);}
  .readout.area{background:var(--area-soft);}
  .eq{font-size:19px;font-weight:800;}
  .eq .res{padding:2px 10px;border-radius:10px;color:#fff;margin-left:2px;}
  .eq.peri .res{background:var(--peri);} .eq.area .res{background:var(--area);}
  .hint{color:var(--muted);font-weight:600;}
  .unit{font-size:13px;color:var(--muted);font-weight:700;}

  .actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .btn{border:none;border-radius:14px;padding:12px 18px;font-weight:800;font-size:15px;
    cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;}
  .btn:active{transform:scale(.96);}
  .btn:focus-visible{outline:3px solid var(--sun);outline-offset:2px;}
  .btn.p{background:var(--area);color:#fff;}
  .btn.o{background:var(--peri);color:#fff;}
  .btn.ghost{background:#fff;color:var(--muted);border:2px solid var(--line);box-shadow:none;}

  .cheer{display:inline-block;background:var(--sun);color:#5a4200;font-weight:800;
    padding:4px 12px;border-radius:999px;font-size:15px;animation:pop .3s ease;}
  @keyframes pop{from{transform:scale(.6);}to{transform:scale(1);}}

  /* 개념 카드 */
  .concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:560px){.concept-grid{grid-template-columns:1fr;}}
  .cc{border-radius:16px;padding:14px;background:#FBFCFE;border:1px solid var(--line);}
  .cc h3{margin:0 0 8px;font-size:18px;display:flex;align-items:center;gap:8px;}
  .cc.p h3{color:var(--peri);} .cc.a h3{color:var(--area);}
  .cc p{margin:8px 0 0;color:var(--muted);font-weight:600;font-size:14px;line-height:1.5;}
  .walker{fill:var(--peri);}
  .footnote{color:var(--muted);font-size:13px;text-align:center;margin-top:8px;font-weight:600;}

  /* 퀴즈 */
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .qprog{font-weight:800;color:var(--muted);font-size:14px;}
  .qbar{height:9px;background:var(--line);border-radius:99px;overflow:hidden;margin:2px 0 10px;}
  .qbar>span{display:block;height:100%;width:0;background:var(--area);transition:width .3s;}
  .qtext{font-size:19px;font-weight:800;margin:12px 0 2px;text-align:center;}
  .qtext .p{color:var(--peri);} .qtext .a{color:var(--area);}
  .choices{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .choice{border:2px solid var(--line);background:#fff;border-radius:14px;padding:15px;
    font-size:22px;font-weight:800;cursor:pointer;transition:.12s;text-align:center;color:var(--ink);}
  .choice:hover{border-color:var(--ink);}
  .choice:focus-visible{outline:3px solid var(--sun);outline-offset:2px;}
  .choice:disabled{cursor:default;}
  .choice.correct{background:var(--area);color:#fff;border-color:var(--area);}
  .choice.wrong{background:var(--peri-soft);border-color:var(--peri);color:var(--peri);animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .qfeed{margin-top:14px;font-weight:800;font-size:16px;min-height:24px;text-align:center;}
  .qfeed.ok{color:var(--area);} .qfeed.no{color:var(--peri);}
  .qresult{text-align:center;padding:14px 0;}
  .qresult .big{font-size:26px;font-weight:800;margin:6px 0;}
  .qresult .stars{font-size:30px;letter-spacing:4px;margin:8px 0;}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-head">
    <div class="brand">📐 <span class="p">둘레</span>와 <span class="a">넓이</span> 놀이터</div>
    <p class="sub">눌러 보고, 세어 보고, 옮겨 보며 배워요</p>
  </header>

  <nav class="tabs" id="tabs" aria-label="도형 고르기"></nav>
  <main id="main"></main>
  <p class="footnote">둘레는 <b style="color:var(--peri)">빙 두른 길</b>, 넓이는 <b style="color:var(--area)">안쪽을 채운 칸 수</b> · 길이 단위는 모두 1칸 = 1</p>
</div>

<script>
"use strict";
const RM = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const SVGNS="http://www.w3.org/2000/svg";
const S=44, M=30;                 // 한 칸 크기, 여백
const gx=c=>M+c*S, gy=r=>M+r*S;   // 격자좌표 -> px

function el(tag,attrs){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
function tag(name,cls,txt){const e=document.createElement(name);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}

function makeSVG(cols,rows){
  const w=cols*S+2*M, h=rows*S+2*M;
  const svg=el('svg',{viewBox:`0 0 ${w} ${h}`,role:'img'});
  for(let c=0;c<=cols;c++) svg.appendChild(el('line',{class:'gridline',x1:gx(c),y1:gy(0),x2:gx(c),y2:gy(rows)}));
  for(let r=0;r<=rows;r++) svg.appendChild(el('line',{class:'gridline',x1:gx(0),y1:gy(r),x2:gx(cols),y2:gy(r)}));
  return svg;
}
function polyStr(pts){return pts.map(p=>gx(p[0])+','+gy(p[1])).join(' ');}
function mid(a,b){return [(a[0]+b[0])/2,(a[1]+b[1])/2];}

/* ---------- 데이터: 각 도형 ---------- */
const SHAPES={
  square:{cols:8,rows:8,label:'정사각형',
    pts:()=>{const n=state.square;return[[1,1],[1+n,1],[1+n,1+n],[1,1+n]];},
    lens:()=>{const n=state.square;return[n,n,n,n];},
    periForm:n=>`한 변 × 4 = ${n} × 4`, peri:n=>n*4,
    areaForm:n=>`한 변 × 한 변 = ${n} × ${n}`, area:n=>n*n,
    stepper:{key:'square',lab:'한 변',min:2,max:6}},
  rect:{cols:9,rows:8,label:'직사각형',
    pts:()=>{const w=state.rw,h=state.rh;return[[1,1],[1+w,1],[1+w,1+h],[1,1+h]];},
    lens:()=>{const w=state.rw,h=state.rh;return[w,h,w,h];},
    periForm:()=>`(가로 + 세로) × 2 = (${state.rw} + ${state.rh}) × 2`, peri:()=>(state.rw+state.rh)*2,
    areaForm:()=>`가로 × 세로 = ${state.rw} × ${state.rh}`, area:()=>state.rw*state.rh,
    steppers:[{key:'rw',lab:'가로',min:2,max:7},{key:'rh',lab:'세로',min:2,max:6}]},
  para:{cols:12,rows:7,label:'평행사변형',
    pts:()=>[[1,5],[7,5],[10,1],[4,1]],
    lens:()=>[6,5,6,5], sideNames:['밑변','옆변','밑변','옆변'],
    periForm:()=>'(밑변 + 옆변) × 2 = (6 + 5) × 2', peri:()=>22,
    areaForm:()=>'밑변 × 높이 = 6 × 4', area:()=>24,
    transform:'para'},
  trap:{cols:13,rows:7,label:'사다리꼴',
    pts:()=>[[1,5],[8,5],[5,1],[1,1]],
    lens:()=>[7,5,4,4], sideNames:['아랫변','옆변','윗변','옆변'],
    periForm:()=>'윗변 + 아랫변 + 두 변 = 4 + 7 + 4 + 5', peri:()=>20,
    areaForm:()=>'(윗변 + 아랫변) × 높이 ÷ 2 = (4 + 7) × 4 ÷ 2', area:()=>22,
    transform:'trap', joinSide:1},
  tri:{cols:()=>state.triType==='right'?7:13, rows:()=>6, label:'삼각형',
    // 꼭짓점 순서 [밑변왼쪽, 밑변오른쪽, 꼭지점]
    pts:()=>state.triType==='right'?[[1,4],[5,4],[1,1]]:[[1,4],[9,4],[5,1]],
    lens:()=>state.triType==='right'?[4,5,3]:[8,5,5],
    periForm:()=>state.triType==='right'?'세 변의 합 = 4 + 5 + 3':'세 변의 합 = 8 + 5 + 5',
    peri:()=>state.triType==='right'?12:18,
    areaForm:()=>state.triType==='right'?'밑변 × 높이 ÷ 2 = 4 × 3 ÷ 2':'밑변 × 높이 ÷ 2 = 8 × 3 ÷ 2',
    area:()=>state.triType==='right'?6:12,
    typeKey:'triType',
    types:[{key:'iso',label:'이등변삼각형'},{key:'right',label:'직각삼각형'}]}
};
SHAPES.trap.areaForm=()=>'(윗변 + 아랫변) × 높이 ÷ 2 = (4 + 7) × 4 ÷ 2';

// 넓이를 구하는 방법 (여러 개 가능)
SHAPES.para.methods=[{label:'✨ 왜 그럴까요?',kind:'para',cap:'삼각형을 잘라 오른쪽으로 옮기면 직사각형이 돼요.'}];
SHAPES.trap.methods=[{label:'✨ 왜 그럴까요?',kind:'double',joinSide:1,cap:'똑같은 사다리꼴 2개로 평행사변형! 넓이는 그 절반이에요.'}];
SHAPES.tri.methods=[
  {label:'📐 직사각형으로',kind:'trirect',cap:'직사각형(밑변 × 높이)의 절반이 삼각형이에요.'},
  {label:'▰ 평행사변형으로',kind:'double',joinSide:1,cap:'똑같은 삼각형 2개를 붙이면 넓이는 2배! 삼각형은 그 절반이에요.'}
];

const state={view:'intro',square:4,rw:5,rh:3,triType:'iso'};

/* ---------- 탭 ---------- */
const NAV=[['intro','🚶','둘레와 넓이'],['square','⬛','정사각형'],['rect','▬','직사각형'],
  ['para','▰','평행사변형'],['trap','⏢','사다리꼴'],['tri','🔺','삼각형'],['quiz','🎯','문제 풀기']];
const tabs=document.getElementById('tabs'), main=document.getElementById('main');
NAV.forEach(([id,ic,label])=>{
  const b=tag('button','tab');b.dataset.id=id;
  b.innerHTML=`<span class="ic">${ic}</span><span>${label}</span>`;
  b.onclick=()=>show(id);
  tabs.appendChild(b);
});
function show(id){
  state.view=id;
  [...tabs.children].forEach(t=>t.classList.toggle('on',t.dataset.id===id));
  [...main.children].forEach(v=>v.classList.toggle('on',v.dataset.id===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---------- 개념(intro) 뷰 ---------- */
function buildIntro(){
  const sec=tag('section','view');sec.dataset.id='intro';
  const card=tag('div','card');
  card.appendChild(tag('h2',null,'둘레와 넓이가 뭐예요?'));
  card.appendChild(Object.assign(tag('p','lead'),{textContent:'버튼을 눌러 움직이는 모습을 보세요.'}));
  const grid=tag('div','concept-grid');

  // 둘레 패널
  const p=tag('div','cc p');
  p.innerHTML='<h3>🚶 둘레</h3>';
  const psvg=makeSVG(7,5);
  const rp=[[1,1],[6,1],[6,4],[1,4]];
  psvg.appendChild(el('polygon',{points:polyStr(rp),fill:'var(--peri-soft)'}));
  const path=el('polygon',{points:polyStr(rp),fill:'none',stroke:'var(--peri)','stroke-width':6,'stroke-linecap':'round','stroke-linejoin':'round'});
  psvg.appendChild(path);
  const walker=el('circle',{class:'walker',r:11,cx:gx(1),cy:gy(1)});
  psvg.appendChild(walker);
  p.appendChild(psvg);
  const pcap=tag('p',null,'도형을 빙 둘러싼 길이가 둘레예요. (여기선 5+3+5+3 = 16)');
  p.appendChild(pcap);
  const pbtn=tag('button','btn o','▶ 한 바퀴 돌기');pbtn.style.marginTop='10px';
  p.appendChild(pbtn);
  grid.appendChild(p);

  // 넓이 패널
  const a=tag('div','cc a');
  a.innerHTML='<h3>🧱 넓이</h3>';
  const asvg=makeSVG(7,5);
  asvg.appendChild(el('polygon',{points:polyStr(rp),fill:'#fff',stroke:'var(--area)','stroke-width':4}));
  const cellsG=el('g',{});asvg.appendChild(cellsG);
  const acount=el('text',{x:gx(3.5),y:gy(2.5)+8,'text-anchor':'middle','font-size':40,'font-weight':800,fill:'var(--area)',opacity:0});
  asvg.appendChild(acount);
  a.appendChild(asvg);
  const acap=tag('p',null,'안쪽을 빈틈없이 채운 칸 수가 넓이예요. (여기선 5 × 3 = 15칸)');
  a.appendChild(acap);
  const abtn=tag('button','btn p','▶ 칸 채우기');abtn.style.marginTop='10px';
  a.appendChild(abtn);
  grid.appendChild(a);

  card.appendChild(grid);
  sec.appendChild(card);
  main.appendChild(sec);

  // 둘레 애니메이션 (dot walk)
  let anim=null;
  pbtn.onclick=()=>{
    if(anim)cancelAnimationFrame(anim);
    const segs=[]; let total=0;
    for(let i=0;i<rp.length;i++){const A=rp[i],B=rp[(i+1)%rp.length];
      const len=Math.hypot(B[0]-A[0],B[1]-A[1]);segs.push({A,B,len});total+=len;}
    const speed=2.2; let t=0; const t0=performance.now();
    function step(now){
      t=((now-t0)/1000*speed)%total; let d=t;
      for(const s of segs){if(d<=s.len){const f=d/s.len;
        walker.setAttribute('cx',gx(s.A[0]+(s.B[0]-s.A[0])*f));
        walker.setAttribute('cy',gy(s.A[1]+(s.B[1]-s.A[1])*f));break;}d-=s.len;}
      anim=requestAnimationFrame(step);
    }
    if(RM){walker.setAttribute('cx',gx(1));walker.setAttribute('cy',gy(1));}
    else anim=requestAnimationFrame(step);
  };
  // 넓이 애니메이션 (fill)
  abtn.onclick=()=>{
    cellsG.innerHTML='';acount.setAttribute('opacity',0);
    let n=0; const list=[];
    for(let r=1;r<4;r++)for(let c=1;c<6;c++)list.push([c,r]);
    list.forEach(([c,r],i)=>{
      const rect=el('rect',{class:'cell',x:gx(c)+2,y:gy(r)+2,width:S-4,height:S-4,rx:5});
      cellsG.appendChild(rect);
      setTimeout(()=>{rect.classList.add('show');n++;
        if(n===list.length){acount.textContent=n;acount.setAttribute('opacity',1);}
      },RM?0:i*90);
    });
  };
}

/* ---------- 도형 뷰 (둘레 + 넓이) ---------- */
function buildShape(id){
  const cfg=SHAPES[id];
  const sec=tag('section','view');sec.dataset.id=id;
  const card=tag('div','card');
  card.appendChild(tag('h2',null,cfg.label));
  const lead=tag('p','lead','아래에서 둘레와 넓이를 골라 보세요.');
  card.appendChild(lead);

  // 모드 토글
  const modes=tag('div','modes');
  const mp=tag('button','mode-btn peri');mp.innerHTML='<span class="dot p"></span>둘레';
  const ma=tag('button','mode-btn area');ma.innerHTML='<span class="dot a"></span>넓이';
  modes.append(mp,ma);card.appendChild(modes);

  // 스테퍼(정사각형/직사각형)
  let steppersWrap=null;
  const stps=cfg.steppers||(cfg.stepper?[cfg.stepper]:[]);
  if(stps.length){
    steppersWrap=tag('div','steppers');
    stps.forEach(sp=>{
      const box=tag('div','stp');
      box.appendChild(tag('span','lab',sp.lab));
      const minus=tag('button',null,'−');const val=tag('span','val',String(state[sp.key]));const plus=tag('button',null,'+');
      const upd=()=>{val.textContent=state[sp.key];minus.disabled=state[sp.key]<=sp.min;plus.disabled=state[sp.key]>=sp.max;render();};
      minus.onclick=()=>{if(state[sp.key]>sp.min){state[sp.key]--;upd();}};
      plus.onclick=()=>{if(state[sp.key]<sp.max){state[sp.key]++;upd();}};
      box.append(minus,val,plus);steppersWrap.appendChild(box);
      minus.disabled=state[sp.key]<=sp.min;plus.disabled=state[sp.key]>=sp.max;
    });
    card.appendChild(steppersWrap);
  }

  // 종류 선택(삼각형: 이등변 / 직각)
  let typeWrap=null;
  if(cfg.types){
    typeWrap=tag('div','typesel');
    typeWrap.appendChild(tag('span','tlab','종류'));
    const updT=()=>[...typeWrap.querySelectorAll('.tbtn')].forEach(x=>x.classList.toggle('on',x.dataset.key===state[cfg.typeKey]));
    cfg.types.forEach(tp=>{
      const b=tag('button','tbtn',tp.label);b.dataset.key=tp.key;
      b.onclick=()=>{state[cfg.typeKey]=tp.key;updT();render();};
      typeWrap.appendChild(b);
    });
    updT();card.appendChild(typeWrap);
  }
  const RC=()=>typeof cfg.cols==='function'?cfg.cols():cfg.cols;
  const RR=()=>typeof cfg.rows==='function'?cfg.rows():cfg.rows;

  const stage=tag('div','stage');card.appendChild(stage);
  const readout=tag('div','readout');card.appendChild(readout);
  const actions=tag('div','actions');card.appendChild(actions);
  sec.appendChild(card);main.appendChild(sec);

  let mode='peri';
  function setMode(m){mode=m;mp.classList.toggle('on',m==='peri');ma.classList.toggle('on',m==='area');
    if(steppersWrap)steppersWrap.style.display=(id==='square'||id==='rect')?'flex':'none';
    render();}
  mp.onclick=()=>setMode('peri');ma.onclick=()=>setMode('area');

  function render(){ mode==='peri'?renderPeri():renderArea(); }

  /* ===== 둘레 ===== */
  function renderPeri(){
    stage.innerHTML='';actions.innerHTML='';
    readout.className='readout peri';readout.innerHTML='<span class="hint">변을 하나씩 눌러 보세요 👆</span>';
    const svg=makeSVG(RC(),RR());
    const pts=cfg.pts(),lens=cfg.lens();
    svg.appendChild(el('polygon',{class:'shape-fill',points:polyStr(pts),fill:'var(--peri-soft)'}));
    let sum=0,done=0;const tally=[];const N=pts.length;
    for(let i=0;i<N;i++){
      const A=pts[i],B=pts[(i+1)%N];
      const line=el('line',{class:'side',x1:gx(A[0]),y1:gy(A[1]),x2:gx(B[0]),y2:gy(B[1])});
      const hit=el('line',{class:'hit',x1:gx(A[0]),y1:gy(A[1]),x2:gx(B[0]),y2:gy(B[1]),tabindex:0,role:'button'});
      const mp2=mid(A,B);
      // 라벨 위치를 바깥으로 살짝
      const nx=(B[1]-A[1]),ny=-(B[0]-A[0]);const nl=Math.hypot(nx,ny)||1;
      const off=0.55;
      const lab=el('text',{class:'lenlabel','text-anchor':'middle',
        x:gx(mp2[0])+nx/nl*S*off, y:gy(mp2[1])+ny/nl*S*off+6});
      lab.textContent=lens[i];
      function tapSide(){
        if(hit.dataset.done)return;hit.dataset.done='1';
        line.classList.add('done');lab.classList.add('show');
        sum+=lens[i];done++;tally.push(lens[i]);updatePeri();
      }
      hit.addEventListener('click',tapSide);
      hit.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();tapSide();}});
      svg.append(line,hit,lab);
    }
    pts.forEach(p=>svg.appendChild(el('circle',{class:'vertex',cx:gx(p[0]),cy:gy(p[1]),r:5})));
    stage.appendChild(svg);
    function updatePeri(){
      const eq=tag('div','eq peri');
      eq.innerHTML=`${tally.join(' + ')} = <span class="res">${sum}</span> <span class="unit">(칸)</span>`;
      readout.innerHTML='';readout.appendChild(eq);
      if(done===pts.length){
        const form=(id==='square')?cfg.periForm(state.square):cfg.periForm();
        readout.appendChild(Object.assign(document.createElement('div'),
          {style:'width:100%;color:var(--muted);font-weight:700;font-size:14px;margin-top:4px',textContent:'빠른 식: '+form}));
        const c=tag('span','cheer','🎉 둘레 완성!');c.style.marginTop='6px';readout.appendChild(c);
      }
    }
    const reset=tag('button','btn ghost','↺ 다시 세기');reset.onclick=renderPeri;actions.appendChild(reset);
  }

  /* ===== 넓이 ===== */
  function renderArea(){
    stage.innerHTML='';actions.innerHTML='';
    readout.className='readout area';
    if(id==='square'||id==='rect') renderAreaFill();
    else renderAreaTransform();
  }

  function renderAreaFill(){
    const w=(id==='square')?state.square:state.rw;
    const h=(id==='square')?state.square:state.rh;
    const svg=makeSVG(RC(),RR());
    svg.appendChild(el('polygon',{points:polyStr(cfg.pts()),fill:'#fff',stroke:'var(--area)','stroke-width':4}));
    const cellsG=el('g',{});svg.appendChild(cellsG);
    stage.appendChild(svg);
    readout.innerHTML='<span class="hint">‘칸 채우기’를 눌러 안쪽을 세어 보세요 🧱</span>';
    const play=tag('button','btn p','🧱 칸 채우기');
    const reset=tag('button','btn ghost','↺ 다시');
    actions.append(play,reset);
    reset.onclick=renderAreaFill;
    play.onclick=()=>{
      cellsG.innerHTML='';play.disabled=true;
      const list=[];for(let r=1;r<=h;r++)for(let c=1;c<=w;c++)list.push([c,r]);
      let n=0;
      list.forEach(([c,r],i)=>{
        const rect=el('rect',{class:'cell',x:gx(c)+2,y:gy(r)+2,width:S-4,height:S-4,rx:5});
        const num=el('text',{class:'cellnum','text-anchor':'middle',x:gx(c)+S/2,y:gy(r)+S/2+5});
        cellsG.append(rect,num);
        setTimeout(()=>{rect.classList.add('show');n++;num.textContent=n;num.classList.add('show');
          readout.className='readout area';
          readout.innerHTML=`<span class="eq area">채운 칸 = <span class="res">${n}</span> <span class="unit">칸</span></span>`;
          if(n===list.length){
            const form=(id==='square')?cfg.areaForm(state.square):cfg.areaForm();
            readout.innerHTML=`<span class="eq area">${form} = <span class="res">${n}</span> <span class="unit">(칸)</span></span>`+
              `<div style="width:100%;margin-top:6px"><span class="cheer">🎉 넓이 완성!</span></div>`;
            play.disabled=false;
          }
        },RM?0:i*70);
      });
    };
  }

  function buildTransformStage(){
    stage.innerHTML='';
    const svg=makeSVG(RC(),RR());
    const base=el('polygon',{class:'shape-fill',points:polyStr(cfg.pts()),fill:'var(--area-soft)',stroke:'var(--area)','stroke-width':3,'stroke-linejoin':'round'});
    svg.appendChild(base);stage.appendChild(svg);
    return {svg,base};
  }
  function renderAreaTransform(){
    actions.innerHTML='';
    const methods=cfg.methods;
    buildTransformStage();
    readout.className='readout area';
    readout.innerHTML=methods.length>1
      ? '<span class="hint">넓이 구하는 방법을 골라 보세요 👇</span>'
      : '<span class="hint">‘왜 그럴까요?’를 눌러 모양을 바꿔 보세요 ✨</span>';
    function finish(m){
      const form=cfg.areaForm(),val=cfg.area();
      readout.className='readout area';
      readout.innerHTML=`<span class="eq area">${form} = <span class="res">${val}</span> <span class="unit">(칸)</span></span>`+
        (m.cap?`<div style="width:100%;color:var(--muted);font-weight:700;font-size:14px;margin-top:4px">${m.cap}</div>`:'')+
        `<div style="width:100%;margin-top:6px"><span class="cheer">🎉 넓이 완성!</span></div>`;
      actions.querySelectorAll('button').forEach(x=>x.disabled=false);
    }
    methods.forEach(m=>{
      const b=tag('button','btn p',m.label);
      b.onclick=()=>{
        const {svg,base}=buildTransformStage();
        actions.querySelectorAll('button').forEach(x=>x.disabled=true);
        const pts=cfg.pts(),cb=()=>finish(m);
        if(m.kind==='para') animatePara(svg,base,pts,cb);
        else if(m.kind==='trirect') animateTriRect(svg,base,pts,cb);
        else animateDouble(svg,base,pts,m.joinSide,cb);
      };
      actions.appendChild(b);
    });
    const reset=tag('button','btn ghost','↺ 다시');
    reset.onclick=renderAreaTransform;
    actions.appendChild(reset);
  }

  // 평행사변형: 왼쪽 삼각형을 잘라 오른쪽으로 옮겨 직사각형
  function animatePara(svg,base,pts,cb){
    // pts=[[1,5],[7,5],[10,1],[4,1]]  밑변6 높이4 shift3
    base.style.display='none';
    svg.appendChild(el('polygon',{points:polyStr([[4,5],[7,5],[10,1],[4,1]]),fill:'var(--area-soft)',stroke:'var(--area)','stroke-width':3}));
    const cutPoly=el('polygon',{points:polyStr([[1,5],[4,5],[4,1]]),fill:'var(--area)',opacity:.9,stroke:'#fff','stroke-width':2});
    cutPoly.style.transformBox='view-box';
    cutPoly.style.transition=RM?'none':'transform 1.3s cubic-bezier(.4,0,.2,1)';
    svg.appendChild(cutPoly);
    requestAnimationFrame(()=>{cutPoly.style.transform=`translateX(${6*S}px)`;});
    const done=()=>{svg.appendChild(el('polygon',{points:polyStr([[4,1],[10,1],[10,5],[4,5]]),fill:'none',stroke:'var(--area)','stroke-width':4,'stroke-dasharray':'9 6'}));cb();};
    RM?done():setTimeout(done,1350);
  }

  // 삼각형: 밑변×높이 직사각형 안에서 남는 조각을 접어 넣기 → 직사각형의 절반
  function animateTriRect(svg,base,pts,cb){
    // pts=[밑변왼쪽[x0,yb], 밑변오른쪽[x1,yb], 꼭지점[ax,ay]]
    const x0=pts[0][0], x1=pts[1][0], yb=pts[0][1], ax=pts[2][0], ay=pts[2][1];
    svg.appendChild(el('polygon',{points:polyStr([[x0,ay],[x1,ay],[x1,yb],[x0,yb]]),
      fill:'none',stroke:'var(--area)','stroke-width':4,'stroke-dasharray':'9 6'}));
    const corners=[
      {poly:[[x0,ay],[ax,ay],[x0,yb]], m:mid([x0,yb],[ax,ay])},   // 왼쪽 조각 (직각이면 넓이0)
      {poly:[[ax,ay],[x1,ay],[x1,yb]], m:mid([ax,ay],[x1,yb])}    // 오른쪽 조각
    ];
    const els=[];
    corners.forEach(c=>{
      if(Math.abs(c.poly[0][0]-c.poly[1][0])<0.001 && Math.abs(c.poly[1][0]-c.poly[2][0])<0.001) return; // 퇴화 조각 건너뜀
      const p=el('polygon',{points:polyStr(c.poly),fill:'var(--peri-soft)',stroke:'var(--peri)','stroke-width':2,opacity:.95});
      p.style.transformBox='view-box';
      p.style.transformOrigin=`${gx(c.m[0])}px ${gy(c.m[1])}px`;
      p.style.transition=RM?'none':'transform 1.2s cubic-bezier(.4,0,.2,1)';
      svg.appendChild(p);els.push(p);
    });
    requestAnimationFrame(()=>{els.forEach(p=>p.style.transform='rotate(180deg)');});
    RM?cb():setTimeout(cb,1250);
  }

  // 삼각형/사다리꼴: 똑같은 모양을 복제해 180° 뒤집어 붙여 평행사변형
  function animateDouble(svg,base,pts,joinIdx,cb){
    const A=pts[joinIdx],B=pts[(joinIdx+1)%pts.length],m=mid(A,B);
    const dup=el('polygon',{points:polyStr(pts),fill:'var(--peri-soft)',stroke:'var(--peri)','stroke-width':3,opacity:.9});
    dup.style.transformBox='view-box';
    dup.style.transformOrigin=`${gx(m[0])}px ${gy(m[1])}px`;
    dup.style.transition=RM?'none':'transform 1.3s cubic-bezier(.4,0,.2,1)';
    svg.appendChild(dup);
    requestAnimationFrame(()=>{dup.style.transform='rotate(180deg)';});
    RM?cb():setTimeout(cb,1350);
  }

  setMode('peri');
}

/* ---------- 퀴즈 뷰 ---------- */
const QUIZ=[
  {kind:'peri',cols:5,rows:5,pts:[[1,1],[4,1],[4,4],[1,4]],
    labels:[{c:2.5,r:4.6,t:'3'},{c:2.5,r:0.7,t:'3'},{c:0.55,r:2.5,t:'3'},{c:4.5,r:2.5,t:'3'}],
    q:'정사각형의 <span class="p">둘레</span>는 몇 칸일까요?',ans:12,choices:[9,12,6]},
  {kind:'area',cols:6,rows:6,pts:[[1,1],[5,1],[5,5],[1,5]],
    labels:[{c:3,r:5.6,t:'한 변 4'},{c:0.55,r:3,t:'4'}],
    q:'정사각형의 <span class="a">넓이</span>는 몇 칸일까요?',ans:16,choices:[8,16,12]},
  {kind:'peri',cols:7,rows:4,pts:[[1,1],[6,1],[6,3],[1,3]],
    labels:[{c:3.5,r:3.6,t:'5'},{c:3.5,r:0.7,t:'5'},{c:0.55,r:2,t:'2'},{c:6.45,r:2,t:'2'}],
    q:'직사각형의 <span class="p">둘레</span>는?',ans:14,choices:[10,14,7]},
  {kind:'area',cols:6,rows:5,pts:[[1,1],[5,1],[5,4],[1,4]],
    labels:[{c:3,r:4.6,t:'가로 4'},{c:0.5,r:2.5,t:'세로 3'}],
    q:'직사각형의 <span class="a">넓이</span>는?',ans:12,choices:[7,12,14]},
  {kind:'area',cols:8,rows:6,pts:[[1,5],[7,5],[4,1]],dash:[[4,1,4,5]],
    labels:[{c:4,r:5.6,t:'밑변 6'},{c:4.5,r:3,t:'높이 4'}],
    q:'삼각형의 <span class="a">넓이</span>는?',ans:12,choices:[24,12,10]},
  {kind:'area',cols:9,rows:5,pts:[[1,4],[6,4],[8,1],[3,1]],dash:[[3,1,3,4]],
    labels:[{c:3.5,r:4.6,t:'밑변 5'},{c:2.2,r:2.5,t:'높이 3'}],
    q:'평행사변형의 <span class="a">넓이</span>는?',ans:15,choices:[8,15,13]},
  {kind:'area',cols:7,rows:6,pts:[[1,5],[6,5],[4,1],[1,1]],
    labels:[{c:2.5,r:0.7,t:'윗변 3'},{c:3.5,r:5.6,t:'아랫변 5'},{c:0.5,r:3,t:'높이 4'}],
    q:'사다리꼴의 <span class="a">넓이</span>는?',ans:16,choices:[16,32,12]},
  {kind:'peri',cols:5,rows:6,pts:[[1,5],[4,5],[1,1]],
    labels:[{c:2.5,r:5.6,t:'3'},{c:0.5,r:3,t:'4'},{c:3.1,r:2.7,t:'5'}],
    q:'삼각형의 <span class="p">둘레</span>는?',ans:12,choices:[12,9,7]}
];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function drawQuizSVG(q){
  const svg=makeSVG(q.cols,q.rows);
  const stroke=q.kind==='peri'?'var(--peri)':'var(--area)';
  const fill=q.kind==='peri'?'var(--peri-soft)':'var(--area-soft)';
  svg.appendChild(el('polygon',{points:polyStr(q.pts),fill:fill,stroke:stroke,'stroke-width':3,'stroke-linejoin':'round'}));
  (q.dash||[]).forEach(d=>svg.appendChild(el('line',{x1:gx(d[0]),y1:gy(d[1]),x2:gx(d[2]),y2:gy(d[3]),
    stroke:'var(--area)','stroke-width':3,'stroke-dasharray':'6 5'})));
  q.pts.forEach(p=>svg.appendChild(el('circle',{cx:gx(p[0]),cy:gy(p[1]),r:4,fill:'var(--ink)'})));
  q.labels.forEach(l=>{const t=el('text',{x:gx(l.c),y:gy(l.r)+5,'text-anchor':'middle','font-size':17,'font-weight':800,fill:stroke});t.textContent=l.t;svg.appendChild(t);});
  return svg;
}
function buildQuiz(){
  const sec=tag('section','view');sec.dataset.id='quiz';
  const card=tag('div','card');
  const head=tag('div','qhead');
  head.innerHTML='<h2 style="margin:0;font-size:20px">🎯 문제 풀기</h2><span class="qprog"></span>';
  const bar=tag('div','qbar');bar.innerHTML='<span></span>';
  const stage=tag('div','stage');
  const qtext=tag('div','qtext');
  const choices=tag('div','choices');
  const feed=tag('div','qfeed');
  const nextWrap=tag('div','actions');
  card.append(head,bar,stage,qtext,choices,feed,nextWrap);
  sec.appendChild(card);main.appendChild(sec);

  const prog=head.querySelector('.qprog'),fillbar=bar.querySelector('span');
  let idx=0,solved=0,answered=false;

  function renderQ(){
    answered=false;
    const q=QUIZ[idx];
    prog.textContent=`${idx+1} / ${QUIZ.length}`;
    fillbar.style.width=(idx/QUIZ.length*100)+'%';
    stage.innerHTML='';stage.appendChild(drawQuizSVG(q));
    qtext.innerHTML=q.q;
    feed.textContent='';feed.className='qfeed';
    nextWrap.innerHTML='';
    choices.innerHTML='';
    shuffle(q.choices).forEach(v=>{
      const b=tag('button','choice',v+'칸');
      b.onclick=()=>{
        if(v===q.ans){
          b.classList.add('correct');
          [...choices.children].forEach(c=>c.disabled=true);
          if(!answered){solved++;answered=true;}
          feed.textContent='정답이에요! 🎉';feed.className='qfeed ok';
          const nx=tag('button','btn p',idx<QUIZ.length-1?'다음 문제 →':'결과 보기 →');
          nx.onclick=()=>{idx++;idx<QUIZ.length?renderQ():showResult();};
          nextWrap.appendChild(nx);
        }else{
          b.classList.add('wrong');b.disabled=true;
          feed.textContent='다시 골라 볼까요? 🤔';feed.className='qfeed no';
        }
      };
      choices.appendChild(b);
    });
  }
  function showResult(){
    fillbar.style.width='100%';prog.textContent=`${QUIZ.length} / ${QUIZ.length}`;
    stage.innerHTML='';qtext.innerHTML='';choices.innerHTML='';feed.textContent='';nextWrap.innerHTML='';
    const r=tag('div','qresult');
    const full=solved===QUIZ.length;
    const stars='★'.repeat(solved)+'☆'.repeat(QUIZ.length-solved);
    r.innerHTML=`<div class="stars" style="color:var(--sun)">${stars}</div>`+
      `<div class="big">${QUIZ.length}문제 중 <span style="color:var(--area)">${solved}개</span> 해결!</div>`+
      `<div style="color:var(--muted);font-weight:700">${full?'완벽해요! 정말 잘했어요 🎉':'좋아요! 한 번 더 해볼까요? 💪'}</div>`;
    stage.appendChild(r);
    const again=tag('button','btn o','↺ 다시 풀기');
    again.onclick=()=>{idx=0;solved=0;renderQ();};
    nextWrap.appendChild(again);
  }
  renderQ();
}

/* ---------- 초기화 ---------- */
buildIntro();
['square','rect','para','trap','tri'].forEach(buildShape);
buildQuiz();
show('intro');
</script>
