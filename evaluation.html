<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>배운 것 확인하기 — 과일 리듬</title>
<meta name="description" content="과일 이름의 음절 수가 소리의 길이라는 것을 학생이 알게 되었는지 확인합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E7ECEE; --paper-2:#F4F7F8; --ink:#10151A; --ink-soft:#4A5761;
  --rule:#9FB0BA; --live:#C8462C; --hit:#1D7A56; --miss:#9A6A12;
  --pad:clamp(14px,3.5vw,26px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--paper);color:var(--ink);
  font-family:"Noto Sans KR",system-ui,sans-serif;font-size:16px;line-height:1.6;
  padding:var(--pad);padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom));
  display:flex;justify-content:center;overscroll-behavior-y:none;
}
.wrap{width:100%;max-width:780px;display:flex;flex-direction:column;gap:clamp(12px,2.4vw,18px)}
.eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
h1{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:clamp(24px,6.4vw,38px);line-height:1.05}
h1 em{font-style:normal;color:var(--live)}
.cap{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}

.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.seg button{font-size:14px}
.seg button.sel{background:var(--ink);color:var(--paper-2);border-color:var(--ink)}

/* 진행 눈금 — 개념 네 갈래가 보이도록 */
.steps{display:flex;gap:3px}
.steps i{flex:1;height:5px;border-radius:3px;background:var(--rule);opacity:.35;transition:opacity .2s ease,background .2s ease}
.steps i.on{opacity:1;background:var(--ink)}
.steps i.ok{opacity:1;background:var(--hit)}
.steps i.re{opacity:1;background:var(--miss)}

.qbox{background:var(--paper-2);border:1px solid rgba(16,21,26,.1);border-radius:14px;padding:clamp(14px,3vw,20px);display:flex;flex-direction:column;gap:12px}
.qtag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--live)}
.q{font-size:clamp(17px,3.4vw,21px);font-weight:500;line-height:1.4}

.opts{display:grid;gap:8px}
.opts.c2{grid-template-columns:1fr 1fr}
.opts.c4{grid-template-columns:repeat(4,1fr)}
.o{
  background:#fff;border:1px solid rgba(16,21,26,.14);border-radius:12px;
  padding:.9rem .4rem;cursor:pointer;user-select:none;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:border-color .12s ease,transform .08s ease,background .12s ease;
}
.o:hover{background:var(--paper-2)}
.o b{font-size:15px;font-weight:500}
.o span{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--ink-soft)}
.o.sel{border-color:var(--ink);border-width:2px}
.o.ok{border-color:var(--hit);border-width:2px;background:#EAF5F0}
.o.re{border-color:var(--miss);background:#FAF4E8}
.o.on{background:var(--live);border-color:var(--live)}
.o.on b,.o.on span{color:#fff}
.o[disabled]{opacity:.35;pointer-events:none}

/* 길이 막대 — 개념 그 자체를 눈으로 */
.len{width:100%;height:9px;border-radius:5px;background:var(--rule);opacity:.55;margin-top:2px}
.o.on .len{background:#fff;opacity:.9}

button{
  border:1px solid rgba(16,21,26,.18);background:var(--paper-2);color:var(--ink);
  border-radius:10px;padding:12px 0;font-family:"Noto Sans KR";font-size:15px;font-weight:500;
  cursor:pointer;transition:background .12s ease;touch-action:manipulation;
}
button:hover{background:#fff}
button:focus-visible{outline:3px solid var(--live);outline-offset:2px}
button[disabled]{opacity:.35;cursor:default}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#hear{background:var(--ink);color:var(--paper-2);border-color:var(--ink);font-family:"Black Han Sans";font-size:18px}

#msg{
  background:var(--paper-2);border:1px solid rgba(16,21,26,.1);border-radius:12px;
  padding:.85rem 1rem;min-height:56px;font-size:14px;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;text-align:center;
}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid rgba(16,21,26,.12);padding:7px 6px;text-align:left}
th{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:400}
td.n{font-family:"IBM Plex Mono",monospace}
.sheet{background:var(--paper-2);border:1px solid rgba(16,21,26,.1);border-radius:12px;padding:12px}
footer{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.05em;color:var(--ink-soft);text-align:center;line-height:1.7}
.hide{display:none}
@media (max-width:520px){.opts.c4{grid-template-columns:1fr 1fr}.btns{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <p class="eyebrow">과일 리듬 · 배운 것 확인하기</p>
  <h1>이름이 길면<br>소리도 <em>길다</em></h1>
</header>

<div>
  <p class="cap" style="margin-bottom:8px"><span>학생</span><span id="prog"></span></p>
  <div class="seg" id="who"></div>
</div>

<div class="steps" id="steps"></div>

<div class="qbox">
  <p class="qtag" id="qtag"></p>
  <p class="q" id="q"></p>
  <div id="stim"></div>
  <div class="opts" id="opts"></div>
</div>

<div class="btns">
  <button id="hear">소리 듣기</button>
  <button id="next">다음</button>
</div>

<div id="msg">문제를 듣고 골라 보세요.</div>

<div id="report" class="hide">
  <p class="cap" style="margin:6px 0 8px"><span>확인 결과</span><span id="stamp"></span></p>
  <div class="sheet"><table id="tbl"></table></div>
  <div class="btns" style="margin-top:8px">
    <button id="csv">결과 내려받기 (CSV)</button>
    <button id="reset">처음부터</button>
  </div>
</div>

<footer>박재근 · 리듬 표현 및 활동의 실제<br>소리가 나지 않으면 화면을 한 번 누른 뒤 눌러 주세요<br>결과는 이 화면에만 남습니다. 끝나면 반드시 내려받으세요</footer>
</div>

<script>
(function(){
var $ = function(id){ return document.getElementById(id); };
var PITCH = 523.25, BPM = 80;
var NAME  = { gyul:'귤', sagwa:'사과', banana:'바나나', pine:'파인애플' };
var UNITS = { gyul:1, sagwa:2, banana:3, pine:4 };

/* 개념 네 갈래 — 수업에서 다룬 순서 그대로 */
var QS = [
  { c:'더 긴 것', q:'둘 중 소리가 더 긴 과일은?', hear:['gyul','banana'],
    opts:['gyul','banana'], ans:'banana',
    tip:'이름을 소리 내어 말해 보세요. 어느 쪽이 더 오래 걸리나요?' },
  { c:'더 긴 것', q:'둘 중 소리가 더 긴 과일은?', hear:['pine','sagwa'],
    opts:['pine','sagwa'], ans:'pine',
    tip:'파인애플은 네 박, 사과는 두 박이에요. 다시 들어볼까요?' },

  { c:'같은 길이', q:'사과 하나와 길이가 같은 것은?', hear:['sagwa'], stim:'sagwa',
    opts:['gyul','gyul+gyul','banana'], ans:'gyul+gyul',
    tip:'사과는 두 박이에요. 두 박을 만들려면 귤이 몇 개 필요할까요?' },
  { c:'같은 길이', q:'파인애플 하나와 길이가 같은 것은?', hear:['pine'], stim:'pine',
    opts:['sagwa+sagwa','banana','gyul+gyul'], ans:'sagwa+sagwa',
    tip:'파인애플은 네 박이에요. 사과 하나가 두 박이니까요.' },

  { c:'마디 채우기', q:'4/4 마디에 바나나가 놓여 있어요. 남은 자리에 들어갈 수 있는 과일은?',
    bar:{num:4, has:['banana']}, opts:['gyul','sagwa','banana','pine'], ans:'gyul',
    tip:'바나나가 세 박을 썼어요. 몇 박이 남았는지 세어 볼까요?' },
  { c:'마디 채우기', q:'3/4 마디는 비어 있어요. 여기에 들어갈 수 없는 과일은?',
    bar:{num:3, has:[]}, opts:['gyul','sagwa','banana','pine'], ans:'pine',
    tip:'한 마디가 세 박이에요. 세 박보다 긴 과일이 있나요?' }
];

var STUDENTS = ['학생 A','학생 B','학생 C'];
var who=0, qi=0, tries=0, hears=0, first='', settled=false, t0=0;
var rec = [];  // {who, qi, first, tries, hears, sec, ok}

var AC=null, bus=null, sess=null, noiseBuf=null, timers=[];

function ready(cb){
  if(!AC){
    AC = new (window.AudioContext || window.webkitAudioContext)();
    bus = AC.createGain(); bus.gain.value=.85;
    var c = AC.createDynamicsCompressor();
    c.threshold.value=-13;c.ratio.value=4;c.attack.value=.004;c.release.value=.22;
    bus.connect(c); c.connect(AC.destination);
    var len=Math.floor(AC.sampleRate*.5);
    noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
    var ch=noiseBuf.getChannelData(0);
    for(var i=0;i<len;i++) ch[i]=Math.random()*2-1;
  }
  var go=function(){ var b=AC.createBuffer(1,1,AC.sampleRate),s=AC.createBufferSource();
    s.buffer=b;s.connect(AC.destination);s.start(0);cb(); };
  if(AC.state==='suspended'){ var p=AC.resume(); (p&&p.then)?p.then(go):setTimeout(go,60); }
  else go();
}
function openSess(){ killSess(); sess=AC.createGain(); sess.gain.value=1; sess.connect(bus); return sess; }
function killSess(){
  if(!sess) return;
  var old=sess,n=AC.currentTime; sess=null;
  try{ old.gain.cancelScheduledValues(n); old.gain.setValueAtTime(old.gain.value,n);
       old.gain.linearRampToValueAtTime(0,n+.03);}catch(e){}
  setTimeout(function(){ try{old.disconnect();}catch(e){} },250);
}
function piano(t,dur,dest){
  var out=AC.createGain(); out.connect(dest);
  var lp=AC.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(4600,t);
  lp.frequency.exponentialRampToValueAtTime(1500,t+Math.min(dur,2.2));
  lp.connect(out);
  var env=AC.createGain(); env.connect(lp);
  var body=Math.max(dur-.055,.06);
  env.gain.setValueAtTime(.0001,t);
  env.gain.exponentialRampToValueAtTime(.52,t+.005);
  env.gain.exponentialRampToValueAtTime(.26,t+Math.min(body*.28,.45));
  env.gain.exponentialRampToValueAtTime(.1,t+body);
  env.gain.exponentialRampToValueAtTime(.0001,t+dur);
  [[1,1],[2,.46],[3,.24],[4,.13],[5,.075],[1.0025,.55],[.999,.4]].forEach(function(p){
    var o=AC.createOscillator(); o.type='sine'; o.frequency.value=PITCH*p[0];
    var g=AC.createGain(); g.gain.value=p[1];
    o.connect(g); g.connect(env); o.start(t); o.stop(t+dur+.06);
  });
}
function lit(key){
  timers.forEach(clearTimeout); timers=[];
  document.querySelectorAll('.o').forEach(function(o){ o.classList.remove('on'); });
  var el = document.querySelector('.o[data-key="'+key+'"]');
  if(el){ el.classList.add('on'); timers.push(setTimeout(function(){ el.classList.remove('on'); }, 60/BPM*UNITS[key]*1000)); }
}
function seq(keys, light){
  ready(function(){
    var g=openSess(), spb=60/BPM, t=AC.currentTime+.1, acc=0;
    keys.forEach(function(k, i){
      piano(t+spb*acc, spb*UNITS[k]-.04, g);
      if(light){ (function(kk,d){ timers.push(setTimeout(function(){ lit(kk); }, d)); })(k, spb*acc*1000+80); }
      acc += UNITS[k] + .7;
    });
  });
}
function keysOf(opt){ return opt.split('+'); }
function unitsOf(opt){ var s=0; keysOf(opt).forEach(function(k){ s+=UNITS[k]; }); return s; }
function labelOf(opt){ return keysOf(opt).map(function(k){ return NAME[k]; }).join(' + '); }

function say(t,c){ $('msg').textContent=t; $('msg').style.color=c||'var(--ink-soft)'; }

function drawSteps(){
  var s=$('steps'); s.innerHTML='';
  QS.forEach(function(_,i){
    var b=document.createElement('i');
    var r=rec.filter(function(x){ return x.who===who && x.qi===i; })[0];
    if(r) b.className = r.ok ? 'ok' : 're';
    else if(i===qi) b.className='on';
    s.appendChild(b);
  });
}
function drawStim(){
  var Q=QS[qi], box=$('stim'); box.innerHTML='';
  if(Q.bar){
    var wrapEl=document.createElement('div');
    wrapEl.style.cssText='position:relative;border-radius:10px;background:#fff;border:1px solid rgba(16,21,26,.12);height:52px;overflow:hidden';
    var used=0; Q.bar.has.forEach(function(k){ used+=UNITS[k]; });
    for(var i=1;i<Q.bar.num;i++){
      var l=document.createElement('i');
      l.style.cssText='position:absolute;top:0;bottom:0;width:1px;background:var(--rule);opacity:.6;left:'+(i/Q.bar.num*100)+'%';
      wrapEl.appendChild(l);
    }
    var x=0;
    Q.bar.has.forEach(function(k){
      var d=document.createElement('div');
      d.style.cssText='position:absolute;top:4px;bottom:4px;border-radius:7px;background:var(--paper-2);border:1px solid rgba(16,21,26,.14);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;'
        +'left:calc('+(x/Q.bar.num*100)+'% + 2px);width:calc('+(UNITS[k]/Q.bar.num*100)+'% - 4px)';
      d.textContent=NAME[k]+' '+UNITS[k]+'박';
      wrapEl.appendChild(d); x+=UNITS[k];
    });
    var rest=Q.bar.num-used;
    if(rest>0){
      var e=document.createElement('div');
      e.style.cssText='position:absolute;top:4px;bottom:4px;border-radius:7px;border:1px dashed var(--rule);display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono";font-size:10px;color:var(--ink-soft);'
        +'left:calc('+(used/Q.bar.num*100)+'% + 2px);width:calc('+(rest/Q.bar.num*100)+'% - 4px)';
      e.textContent=rest+'박 남음';
      wrapEl.appendChild(e);
    }
    box.appendChild(wrapEl);
  }
}
function drawOpts(){
  var Q=QS[qi], box=$('opts');
  box.className='opts ' + (Q.opts.length===2?'c2':Q.opts.length===3?'c2':'c4');
  box.innerHTML='';
  Q.opts.forEach(function(opt){
    var d=document.createElement('div');
    d.className='o'; d.dataset.key=opt; d.setAttribute('role','button'); d.tabIndex=0;
    var u=unitsOf(opt);
    d.innerHTML='<b>'+labelOf(opt)+'</b><span>'+u+'박</span>'
      +'<div class="len" style="width:'+(u/4*100)+'%"></div>';
    var go=function(){ pick(opt); };
    d.onclick=go;
    d.onkeydown=function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } };
    box.appendChild(d);
  });
}
function pick(opt){
  if(settled) return;
  var Q=QS[qi];
  tries++;
  if(!first) first=opt;
  var el=document.querySelector('.o[data-key="'+opt+'"]');
  seq(keysOf(opt), false);
  if(opt===Q.ans){
    settled=true;
    if(el) el.classList.add('ok');
    document.querySelectorAll('.o').forEach(function(o){ if(o!==el) o.setAttribute('disabled',''); });
    rec.push({ who:who, qi:qi, first:first, tries:tries, hears:hears,
               sec:Math.round((Date.now()-t0)/100)/10, ok:(tries===1) });
    say(tries===1 ? '맞아요. 다음 문제로 갑니다.' : '이제 맞았어요. 다음 문제로 갑니다.','var(--hit)');
    drawSteps();
  } else {
    if(el){ el.classList.add('re'); setTimeout(function(){ el.classList.remove('re'); },900); }
    say(Q.tip,'var(--miss)');
  }
}
function load(){
  var Q=QS[qi];
  tries=0; hears=0; first=''; settled=false; t0=Date.now();
  $('qtag').textContent='개념 · '+Q.c;
  $('q').textContent=Q.q;
  $('prog').textContent=STUDENTS[who]+' · '+(qi+1)+'/'+QS.length;
  $('next').textContent=(qi===QS.length-1)?'결과 보기':'다음';
  drawStim(); drawOpts(); drawSteps();
  say('[소리 듣기]를 눌러 문제를 들어 보세요.');
}
function drawWho(){
  var w=$('who'); w.innerHTML='';
  STUDENTS.forEach(function(s,i){
    var b=document.createElement('button');
    b.textContent=s; b.className=(i===who?'sel':'');
    b.onclick=function(){ who=i; qi=0; drawWho(); load(); $('report').classList.add('hide'); };
    w.appendChild(b);
  });
}

$('hear').onclick=function(){ hears++; seq(QS[qi].hear || [], true); say('잘 들어 보세요.'); };
$('next').onclick=function(){
  if(!settled && !rec.filter(function(x){ return x.who===who && x.qi===qi; })[0]){
    rec.push({ who:who, qi:qi, first:first||'—', tries:tries, hears:hears,
               sec:Math.round((Date.now()-t0)/100)/10, ok:false, skip:true });
  }
  if(qi<QS.length-1){ qi++; load(); } else report();
};

function report(){
  var t=$('tbl'), rows=rec.filter(function(x){ return true; });
  if(!rows.length){ t.innerHTML='<tr><td>기록이 없습니다.</td></tr>'; }
  else{
    var h='<tr><th>학생</th><th>개념</th><th>문항</th><th>첫 선택</th><th>시도</th><th>들음</th><th>시간</th><th>결과</th></tr>';
    rows.forEach(function(r){
      var Q=QS[r.qi];
      h+='<tr><td>'+STUDENTS[r.who]+'</td><td>'+Q.c+'</td><td class="n">'+(r.qi+1)+'</td>'
        +'<td>'+(r.first==='—'?'—':labelOf(r.first))+'</td><td class="n">'+r.tries+'</td>'
        +'<td class="n">'+r.hears+'</td><td class="n">'+r.sec+'초</td>'
        +'<td>'+(r.skip?'미응답':r.ok?'한 번에':'다시 시도')+'</td></tr>';
    });
    t.innerHTML=h;
  }
  $('stamp').textContent=new Date().toLocaleString('ko-KR');
  $('report').classList.remove('hide');
  $('report').scrollIntoView({ behavior:'smooth', block:'start' });
}
$('csv').onclick=function(){
  var out=['학생,개념,문항,질문,첫선택,시도횟수,들은횟수,걸린시간(초),결과'];
  rec.forEach(function(r){
    var Q=QS[r.qi];
    out.push([STUDENTS[r.who], Q.c, r.qi+1, '"'+Q.q+'"',
      (r.first==='—'?'—':labelOf(r.first)), r.tries, r.hears, r.sec,
      (r.skip?'미응답':r.ok?'한 번에':'다시 시도')].join(','));
  });
  var blob=new Blob(['\ufeff'+out.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='개념확인_기록_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};
$('reset').onclick=function(){
  if(!confirm('결과를 모두 지우고 처음부터 시작합니다. 내려받지 않은 기록은 사라집니다.')) return;
  rec=[]; who=0; qi=0; $('report').classList.add('hide'); drawWho(); load();
};

drawWho(); load();
})();
</script>
</body>
</html>
